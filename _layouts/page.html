---
layout: default
---

<article class="page">
  
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.show_rss %}
    <button class="rss-copy-btn" data-url="{{ '/feed.xml' | absolute_url }}" title="Copy RSS feed URL">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <circle cx="6.18" cy="17.82" r="2.18"/>
        <path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83c0-8.59-6.97-15.56-15.56-15.56zm0 5.66v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z"/>
      </svg>
      <span class="rss-copy-label">rss</span>
    </button>
    {% endif %}
  </header>

  <div class="page-content">
    {{ content }}
  </div>

</article>
